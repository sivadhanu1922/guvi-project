<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — GUVI</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">G<span>U</span>VI</div>
    <span id="navGreet" style="font-size:13px;color:#8b93a5;"></span>
  </nav>

  <div class="profile-page">

    <div id="msgProfile" class="alert"></div>

    <div class="profile-layout">

      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="sidebar-avatar" id="avatarInitials">?</div>
        <div class="sidebar-name" id="sidebarName">—</div>
        <div class="sidebar-username" id="sidebarUsername">@—</div>
        <div class="sidebar-email" id="sidebarEmail">—</div>

        <div class="sidebar-nav">
          <div class="sidebar-nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            My Profile
          </div>
          <div class="sidebar-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
      
          </div>
          <div class="sidebar-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
           
          </div>
        </div>

        <div class="sidebar-logout">
          <button class="btn btn-danger" id="logoutBtn">Sign Out</button>
        </div>
      </div>

      <!-- MAIN -->
      <div>

        <!-- VIEW MODE -->
        <div id="viewMode">
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">Account Information</div>
                <div class="card-subtitle"></div>
              </div>
            </div>
            <div class="field-grid">
              <div class="field-item">
                <div class="field-label">First Name</div>
                <div class="field-value" id="v_first_name">—</div>
              </div>
              <div class="field-item">
                <div class="field-label">Last Name</div>
                <div class="field-value" id="v_last_name">—</div>
              </div>
              <div class="field-item">
                <div class="field-label">Username</div>
                <div class="field-value" id="v_username">—</div>
              </div>
              <div class="field-item">
                <div class="field-label">Email</div>
                <div class="field-value" id="v_email">—</div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">Personal Details</div>
                <div class="card-subtitle"></div>
              </div>
              <button class="btn btn-outline" id="editBtn" style="width:auto;padding:7px 16px;font-size:13px;">Edit</button>
            </div>
            <div class="field-grid">
              <div class="field-item">
                <div class="field-label">Age</div>
                <div class="field-value" id="v_age">—</div>
              </div>
              <div class="field-item">
                <div class="field-label">Date of Birth</div>
                <div class="field-value" id="v_dob">—</div>
              </div>
              <div class="field-item">
                <div class="field-label">Contact</div>
                <div class="field-value" id="v_contact">—</div>
              </div>
              <div class="field-item">
                <div class="field-label">Gender</div>
                <div class="field-value" id="v_gender">—</div>
              </div>
              <div class="field-item full">
                <div class="field-label">Address</div>
                <div class="field-value" id="v_address">—</div>
              </div>
            </div>
          </div>
        </div>

        <!-- EDIT MODE -->
        <div id="editMode" style="display:none;">
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">Edit Personal Details</div>
                <div class="card-subtitle"></div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" placeholder="25"/>
              </div>
              <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob"/>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Contact Number</label>
                <input type="text" id="contact" placeholder="+91 9876543210"/>
              </div>
              <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                  <option value="">Select</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                  <option value="Prefer not to say">Prefer not to say</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Address</label>
              <input type="text" id="address" placeholder="12, Anna Nagar, Chennai"/>
            </div>

            <div class="edit-actions">
              <button class="btn" id="saveBtn" style="width:auto;padding:10px 24px;">Save Changes</button>
              <button class="btn btn-outline" id="cancelBtn" style="width:auto;padding:10px 24px;">Cancel</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
