<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GUVI — Next Gen Platform</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">G<em>U</em>VI</div>
    <div class="nav-right">
      <span class="nav-pill">v2.0 · 2026</span>
      <a href="login.html" class="nav-btn">Sign In</a>
    </div>
  </nav>

  <div class="index-wrap">
    <div class="index-badge"><div class="dot-live"></div> Platform Live</div>
    <h1 class="index-h1">
      <span class="h1-solid">Build</span>
      <span class="h1-outline">Your</span>
      <span class="h1-glow">Future.</span>
    </h1>
    <p class="index-sub">A next-generation platform engineered for modern learners. Secure accounts, rich profiles, and a seamless experience.</p>
    <div class="index-btns">
      <a href="register.html" class="btn-cta">Get Started</a>
      <a href="login.html" class="btn-ghost">Sign In</a>
    </div>
    <div class="index-stats">
      <div class="stat"><span class="stat-n">10<b>K</b>+</span><span class="stat-l">Users</span></div>
      <div class="stat"><span class="stat-n">99<b>%</b></span><span class="stat-l">Uptime</span></div>
      <div class="stat"><span class="stat-n">3<b>x</b></span><span class="stat-l">Faster</span></div>
    </div>
    <div class="scroll-hint"><div class="scroll-line"></div><span>Scroll</span></div>
  </div>

  <script src="js/effects.js"></script>

</html>
