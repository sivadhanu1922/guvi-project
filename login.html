<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — GUVI</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">G<span>U</span>VI</div>
    <a href="register.html" class="nav-link">Don't have an account? <b>Register</b></a>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <h2>Welcome back</h2>
      <p>Sign in to continue to your profile</p>

      <div id="msg" class="alert"></div>

      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" id="username" placeholder="siva or sivadhanu@example.com"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"/>
      </div>

      <button class="btn" id="loginBtn">Sign In</button>

      <div class="divider">or</div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
