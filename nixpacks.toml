[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.mysqli", "php82Extensions.pdo", "php82Extensions.pdo_mysql"]

[phases.install]
cmds = ["composer install --no-interaction --ignore-platform-reqs"]

[phases.build]
cmds = ["php -m"]

[start]
cmd = "php -S 0.0.0.0:$PORT -t ."