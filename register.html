<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — GUVI</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">G<span>U</span>VI</div>
    <a href="login.html" class="nav-link">Already have an account? <b>Sign in</b></a>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <h2>Create an account</h2>
      <p>Fill in the details below to get started</p>

      <div id="msg" class="alert"></div>

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="first_name" placeholder="John"/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="last_name" placeholder="Doe"/>
        </div>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="johndoe"/>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="john@example.com"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 6 characters"/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm_password" placeholder="Repeat password"/>
        </div>
      </div>

      <button class="btn" id="registerBtn">Create Account</button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
