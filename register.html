<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — GUVI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <nav class="navbar">
    <div class="nav-logo">GUVI</div>
    <a href="login.html" class="nav-link">Already have an account? <span>Sign in</span></a>
  </nav>

  <div class="page-wrap">
    <div class="auth-card">
      <div class="auth-badge">Get Started</div>
      <h2>Create Account</h2>
      <p>Join GUVI and start your journey today</p>

      <div id="msg" class="alert-box"></div>

      <div class="row g-3">
        <div class="col-6">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" id="first_name" placeholder="John"/>
        </div>
        <div class="col-6">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" id="last_name" placeholder="Doe"/>
        </div>
        <div class="col-12">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="username" placeholder="johndoe"/>
        </div>
        <div class="col-12">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="john@example.com"/>
        </div>
        <div class="col-12">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••"/>
        </div>
        <div class="col-12">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirm_password" placeholder="••••••••"/>
        </div>
        <div class="col-12">
          <button class="btn-main" id="registerBtn">Create Account</button>
        </div>
      </div>

      <div class="auth-bottom">
        Already registered? <a href="login.html">Sign in here</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="js/register.js"></script>
  <script src="js/effects.js"></script>
</body>
</html>
